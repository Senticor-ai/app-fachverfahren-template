id: neutral-example-citizen-intake
route: /services/neutral-example
owner: modules/neutral-example
persona: citizen
inputs:
  - publicRuntimeConfig
  - activeSession
  - jurisdictionConfig
outputs:
  - neutral-example.draft-started
  - neutral-example.submitted
states:
  - loading
  - empty
  - error
  - ready
  - success
ia:
  pattern: guided-stepper
  navigation:
    - minimal citizen navigation with one primary next action
    - route is visible only for authenticated citizen sessions
  profile:
    - profile, logout, notifications and settings remain reachable from shell
  scroll:
    - form body and review region scroll independently from shell
content:
  language:
    - simple German microcopy using Sie
  architectureTerms:
    - no basis-service, port or adapter wording in primary UI
hcai:
  mode: none
  controls:
    - if assistive suggestions are added they require marking, source, confidence, why, accept, reject and override
a11y:
  landmarks:
    - main
  labels:
    - all controls have visible labels
  keyboard:
    - Tab reaches every interactive element
    - Enter or Space activates primary actions
  focusOrder:
    - page heading
    - primary action
    - form summary
  zoom:
    - 400 percent zoom reflows without function loss
  statusSemantics:
    - status uses text or icon plus color
tests:
  unit:
    - renders allowed actions for active session
  integration:
    - handles mailbox outage with recovery path
  storybook:
    - default
    - loading
    - empty
    - error
    - success
evidence:
  - storybook story
  - test output
  - accessibility review note
