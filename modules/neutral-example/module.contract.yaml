{
  "$schema": "../../schemas/module-contract.schema.json",
  "schemaVersion": "1.0.0",
  "moduleId": "neutral-example",
  "lifecycle": "reference",
  "owner": "platform-template",
  "riskClass": "medium",
  "publicExports": ["domain.module.yaml", "contracts/*.screen.yaml"],
  "permittedDependencies":
    [
      "@senticor/platform-contracts",
      "@senticor/public-sector-sdk",
      "@senticor/public-sector-ui",
    ],
  "consumedCapabilities": ["identity-and-trust", "mailbox"],
  "routes":
    [
      { "path": "/cases/neutral-example", "surface": "caseworker" },
      { "path": "/services/neutral-example", "surface": "citizen" },
    ],
  "roles": ["citizen", "caseworker"],
  "permissions":
    [
      "neutral-example.case.read",
      "neutral-example.case.write",
      "neutral-example.case.decide",
    ],
  "dataClassifications": ["confidential"],
  "retention": ["neutral-example-case-records"],
  "events":
    {
      "produces":
        ["neutral-example.case-created", "neutral-example.decision-prepared"],
      "consumes": ["mailbox.message-received"],
    },
  "storage":
    {
      "migrations": ["modules/neutral-example/migrations/database/"],
      "ownsTables": ["neutral_example_cases"],
    },
  "externalSources": [],
  "requiredTests": ["check:domain-contracts", "check:module-contracts", "test"],
  "vocabulary": ["Beispielverfahren", "Vorgang", "Entscheidung"],
  "allowedDomainPaths": ["modules/neutral-example"],
}
