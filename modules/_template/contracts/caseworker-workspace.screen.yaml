id: replace-with-domain-id-caseworker-workspace
route: /cases/replace-with-domain-id
owner: modules/replace-with-domain-id
persona: caseworker
inputs:
  - assignedCases
  - activeRole
  - policyDecision
  - jurisdictionConfig
outputs:
  - replace-with-domain-id.case-opened
  - replace-with-domain-id.decision-prepared
states:
  - loading
  - empty
  - error
  - ready
  - success
ia:
  pattern: master-detail
  navigation:
    - sidebar entries are filtered by role and permission flags
    - detail routes expose breadcrumbs back to the case list
  profile:
    - profile, role switch, settings and logout remain reachable from shell
  scroll:
    - case list and detail panel scroll independently with sticky headers
content:
  language:
    - precise German microcopy for administrative work
  architectureTerms:
    - no basis-service, port or adapter wording in primary UI
hcai:
  mode: none
  controls:
    - if assistive suggestions are added they require marking, source, confidence, why, accept, reject and override
a11y:
  landmarks:
    - main
  labels:
    - filters and actions have visible labels
  keyboard:
    - Tab reaches filters, table, and primary action
    - Enter opens the focused row
  focusOrder:
    - page heading
    - filters
    - case list
    - detail region
  zoom:
    - 400 percent zoom reflows without function loss
  statusSemantics:
    - status uses text or icon plus color
tests:
  unit:
    - filters cases by authority and role
  integration:
    - blocks unauthorized decision actions
  storybook:
    - default
    - empty
    - error
    - success
    - keyboard focus
evidence:
  - storybook story
  - test output
  - accessibility review note
