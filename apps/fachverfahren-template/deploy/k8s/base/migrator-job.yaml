apiVersion: batch/v1
kind: Job
metadata:
  name: fachverfahren-migrator
  labels:
    app.kubernetes.io/name: fachverfahren-template
    app.kubernetes.io/component: migrator
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fachverfahren-template
        app.kubernetes.io/component: migrator
    spec:
      restartPolicy: Never
      serviceAccountName: fachverfahren-migrator
      automountServiceAccountToken: false
      containers:
        - name: migrator
          image: registry.opencode.de/senticor/fachverfahren-template:0.1.0-rc.1
          command: ["node"]
          args:
            - "packages/app-store-postgres/dist/migrate.js"
          env:
            - name: APP_MIGRATIONS_DIR
              value: /app/packages/app-store-postgres/migrations
            - name: APP_PG_DIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: app-postgresql
                  key: direct-url
                  optional: true
            - name: APP_PG_URL
              valueFrom:
                secretKeyRef:
                  name: app-postgresql
                  key: pooled-url
                  optional: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 53111
            runAsGroup: 53111
