apiVersion: apps/v1
kind: Deployment
metadata:
  name: fachverfahren-worker
  labels:
    app.kubernetes.io/name: fachverfahren-template
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fachverfahren-template
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fachverfahren-template
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: fachverfahren-worker
      automountServiceAccountToken: false
      containers:
        - name: worker
          image: registry.opencode.de/senticor/fachverfahren-template:0.1.0-rc.1
          command: ["node", "-e"]
          args:
            - "console.log('worker role placeholder'); setInterval(() => {}, 60000)"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 53111
            runAsGroup: 53111
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
