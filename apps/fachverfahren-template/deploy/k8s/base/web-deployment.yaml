apiVersion: apps/v1
kind: Deployment
metadata:
  name: fachverfahren-web
  labels:
    app.kubernetes.io/name: fachverfahren-template
    app.kubernetes.io/component: web
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: fachverfahren-template
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fachverfahren-template
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: fachverfahren-web
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 53111
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: registry.opencode.de/senticor/fachverfahren-template:0.1.0-rc.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: fachverfahren-public-config
          env:
            - name: APP_PG_URL
              valueFrom:
                secretKeyRef:
                  name: app-postgresql
                  key: pooled-url
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /startupz
              port: http
            failureThreshold: 12
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 53111
            runAsGroup: 53111
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
