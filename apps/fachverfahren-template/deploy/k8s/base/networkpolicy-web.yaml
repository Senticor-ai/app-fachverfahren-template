apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fachverfahren-web-network
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: fachverfahren-template
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values: ["kube-system"]
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
      ports:
        - port: 443
          protocol: TCP
        - port: 5432
          protocol: TCP
