{{- if .Values.podDisruptionBudget.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "antragsservice.fullname" . }}
  labels:
    {{- include "antragsservice.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "antragsservice.selectorLabels" . | nindent 6 }}
{{- end }}
