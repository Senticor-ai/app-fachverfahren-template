replicaCount: 2

image:
  repository: registry.example.invalid/senticor/fachverfahren
  tag: "0.1.0"
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 53111
  runAsGroup: 53111
  fsGroup: 53111
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 53111
  runAsGroup: 53111
  capabilities:
    drop:
      - ALL

service:
  port: 80
  targetPort: 8080

internalService:
  port: 9090
  targetPort: 9090

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: fachverfahren.example.invalid
      paths:
        - path: /
          pathType: Prefix
  tls: []

runtime:
  publicBaseUrl: ""
  appEnableServiceWorker: "false"
  appEnableHsts: "true"
  appCspMode: enforce
  appFrameAncestors: "'self'"
  appTrustProxy: loopback
  appAllowedHosts: ""
  appMaxBodyBytes: "1048576"
  appShutdownTimeoutMs: "10000"
  appRequiredUpstreams: ""
  appVersion: ""
  gitSha: ""
  buildTime: ""
  imageDigest: ""

secretRefs: []
extraEnv: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  startup:
    failureThreshold: 30
    periodSeconds: 2
  readiness:
    failureThreshold: 2
    periodSeconds: 5
  liveness:
    failureThreshold: 3
    periodSeconds: 10

terminationGracePeriodSeconds: 30

# Eigenständiger Automations-WORKER (Event-Driven Architecture / horizontale Skalierung): verarbeitet die
# Automations-Outbox + den Deadline-Scanner GETRENNT vom Web-Deployment. Standardmäßig AUS — nur sinnvoll mit
# geteiltem Postgres-Zustand (APP_PG_URL); mehrere Replicas koordinieren über FOR UPDATE SKIP LOCKED.
# Wenn der Worker aktiv ist, sollte der in-Web-Poller (APP_AUTOMATION_POLL_MS) auf 0 bleiben (keine Doppel-Verarbeitung
# nötig — beide wären zwar SKIP-LOCKED-sicher, aber der Worker ist der dedizierte Ort).
worker:
  enabled: false
  replicaCount: 1
  pollMs: 2000
  healthPort: 8081
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 50
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname

networkPolicy:
  enabled: true
  publicIngress:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: ingress-nginx
  monitoringIngress:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: monitoring
  egress:
    allowDns: true
    allowHttps: true
