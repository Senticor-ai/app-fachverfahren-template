apiVersion: v1
kind: Service
metadata:
  name: {{ include "fachverfahren.fullname" . }}
  labels:
    {{- include "fachverfahren.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "fachverfahren.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fachverfahren.fullname" . }}-internal
  labels:
    {{- include "fachverfahren.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "fachverfahren.selectorLabels" . | nindent 4 }}
  ports:
    - name: internal
      port: {{ .Values.internalService.port }}
      targetPort: internal
      protocol: TCP
