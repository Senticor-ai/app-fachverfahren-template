packages:
  - "apps/*"
  - "packages/*"
  - "jurisdictions/*"

nodeLinker: isolated
engineStrict: true
strictPeerDependencies: false
linkWorkspacePackages: true
preferWorkspacePackages: true
verifyDepsBeforeRun: false

allowBuilds:
  esbuild: false
  msw: true
  # protobufjs (transitiv über die OTel-SDK): kein Build-Script nötig — der OTLP-Exporter läuft über HTTP+JSON,
  # nicht protobuf. Bewusst false (kein postinstall-codegen).
  protobufjs: false

catalog:
  "@types/node": ^24.13.3
  typescript: ^7.0.2
  vitest: ^4.1.10
  storybook: ^10.4.5
  "@storybook/addon-a11y": ^10.4.5
  "@storybook/addon-docs": ^10.4.5
  "@storybook/react": ^10.4.5
  "@storybook/react-vite": ^10.4.5
  fastify: ^5.10.0
  "@fastify/sensible": ^6.0.3
  "@fastify/swagger": ^9.4.2
  "@fastify/swagger-ui": ^6.0.0
  "@fastify/static": ^9.1.3
  "@fastify/cors": ^11.2.0
  "@fastify/cookie": ^11.1.1
  fastify-plugin: ^6.0.0
  # TypeBox gepinnt auf <=0.34: @fastify/type-provider-typebox 5.x peert
  # @sinclair/typebox >=0.26 <=0.34; Provider 6.x verlangt das UMBENANNTE
  # Paket typebox@^1 — die Migration darauf ist ein eigener, koordinierter Schritt.
  "@sinclair/typebox": ^0.34.0
  "@fastify/type-provider-typebox": ^5.2.0
  pg: ^8.22.0
  "@types/pg": ^8.20.0
