stages:
  - validate
  - pages
  - image

variables:
  NODE_ENV: test

.node-base:
  image: registry.opencode.de/open-code/oci/nodejs:24
  before_script:
    - export PNPM_HOME="${CI_PROJECT_DIR}/.pnpm"
    - export PATH="${PNPM_HOME}:${PATH}"
    - mkdir -p "${PNPM_HOME}"
    - corepack enable --install-directory "${PNPM_HOME}" pnpm
    - pnpm install --frozen-lockfile=false

.kaniko-base:
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - 'echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d "\n")\"}}}" > /kaniko/.docker/config.json'

validate:
  extends: .node-base
  stage: validate
  script:
    - pnpm run precommit:check
    - pnpm run build:packages
    - pnpm run build:app
    - pnpm run build:server
    - pnpm run test:k8s:render
    - pnpm run evidence:build

pages:
  extends: .node-base
  stage: pages
  needs:
    - validate
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - pnpm run build:storybook
    - rm -rf public
    - mv storybook-static public
  artifacts:
    paths:
      - public

container-image:
  extends: .kaniko-base
  stage: image
  needs:
    - validate
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  script:
    - export IMAGE_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - /kaniko/executor --context "${CI_PROJECT_DIR}" --dockerfile "${CI_PROJECT_DIR}/Dockerfile" --destination "${CI_REGISTRY_IMAGE}:${IMAGE_TAG}" --cache=true --cache-repo "${CI_REGISTRY_IMAGE}/cache"
