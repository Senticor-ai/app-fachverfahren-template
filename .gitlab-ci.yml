stages:
  - validate
  - pages
  - image
  - supply-chain

variables:
  KUBECTL_VERSION: v1.34.9
  NODE_ENV: test

.node-base:
  image: registry.opencode.de/open-code/oci/nodejs:24
  before_script:
    - export TMPDIR="${CI_PROJECT_DIR}/../.tmp-senticor-app-fachverfahren-template"
    - export PNPM_HOME="${CI_PROJECT_DIR}/.pnpm"
    - . scripts/ci-setup-node.sh
    - pnpm install --frozen-lockfile

.kaniko-base:
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - 'echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d "\n")\"}}}" > /kaniko/.docker/config.json'

validate:
  extends: .node-base
  stage: validate
  script:
    - scripts/ci-validate.sh

# Scaffolded-App-Health (core, eine kanonische Domain): scaffoldet `beispiel` und fährt in der generierten
# App DEREN eigenes ci-validate.sh (CI_PROFILE=core). Fängt genau die Fehlerklasse ab, bei der die Vorlage
# grün ist, eine frisch gescaffoldete App aber rot pusht. Läuft auf Branches/MRs, nicht in Schedules
# (dort übernimmt scaffold-nightly die volle Matrix). Self-Skip in Konsumenten via .template/lock.json.
scaffold-health:
  extends: .node-base
  stage: validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success
  script:
    # Kein Artefakt: das generierte App ist deterministisch reproduzierbar (`scaffold:domain-app`) und
    # die fehlerhaften Dateien stehen bereits im Job-Log.
    - export TMPDIR="${CI_PROJECT_DIR}/../.tmp-generated-app-ci"
    - pnpm run test:generated-app-ci

# Volle Parität nächtlich: über eine Domain-Matrix scaffolden und je generiertem App CI_PROFILE=full +
# Runtime-Smoke fahren. Braucht eine GitLab-Pipeline-*Schedule* (Projekt-Einstellungen → CI/CD → Schedules).
scaffold-nightly:
  extends: .node-base
  stage: validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  timeout: 1h
  script:
    - export TMPDIR="${CI_PROJECT_DIR}/../.tmp-generated-app-ci"
    - pnpm run test:generated-app-ci:matrix

pages:
  extends: .node-base
  stage: pages
  needs:
    - validate
    # Nicht veröffentlichen, wenn das Scaffold-Health-Gate rot ist (optional: greift, je nach
    # Pipeline-Typ, scaffold-health auf Branch/Tag bzw. scaffold-nightly im Schedule).
    - job: scaffold-health
      optional: true
    - job: scaffold-nightly
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - pnpm run build:storybook
    - rm -rf public
    - mv storybook-static public
  artifacts:
    paths:
      - public

container-image:
  extends: .kaniko-base
  stage: image
  needs:
    - validate
    - job: scaffold-health
      optional: true
    - job: scaffold-nightly
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  script:
    - export IMAGE_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - /kaniko/executor --context "${CI_PROJECT_DIR}" --dockerfile "${CI_PROJECT_DIR}/Dockerfile" --destination "${CI_REGISTRY_IMAGE}:${IMAGE_TAG}" --cache=true --cache-repo "${CI_REGISTRY_IMAGE}/cache"

# LIEFERKETTEN-NACHWEIS (BSI OPS / SLSA): CycloneDX-SBOM der pnpm-Abhängigkeiten — die auditierbare Stückliste, die bei
# Freigabe/Deploy mitgeht. Selbst-enthalten (cdxgen via npx im vorhandenen Node-Image, kein zusätzliches Registry-Image
# zu spiegeln); als GitLab-CycloneDX-Report + Artefakt exponiert (Security-Dashboard + langfristig aufbewahrt). Generisch:
# kein Verfahrens-Wert. Deploy-HITL/GitLab-Push (der EINE HITL) sieht den SBOM als Freigabe-Artefakt.
sbom:
  extends: .node-base
  stage: supply-chain
  needs:
    - validate
    - job: scaffold-health
      optional: true
    - job: scaffold-nightly
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  script:
    - npx --yes @cyclonedx/cdxgen@^11 -t pnpm --spec-version 1.5 -o sbom.cdx.json . || npx --yes @cyclonedx/cdxgen@^11 -o sbom.cdx.json .
  artifacts:
    paths:
      - sbom.cdx.json
    reports:
      cyclonedx:
        - sbom.cdx.json
    expire_in: 1 year
