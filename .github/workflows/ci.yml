name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare "pnpm@11.1.0" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Format
        run: pnpm run format:check
      - name: Lint
        run: pnpm run lint
      - name: Strict ESM
        run: pnpm run check:esm
      - name: TypeScript source policy
        run: pnpm run check:typescript-policy
      - name: Storybook coverage
        run: pnpm run check:storybook
      - name: CSS token aliases
        run: pnpm run check:css-tokens
      - name: Template lifecycle tests
        run: pnpm run test:template
      - name: Agent platform checks
        run: pnpm run check:agent-discovery && pnpm run check:module-contracts && pnpm run check:module-boundaries && pnpm run check:capability-catalog && pnpm run check:source-registry
      - name: Agent readiness
        run: pnpm run test:agent-readiness
      - name: Template invariants
        run: pnpm run check:template-invariants
      - name: Scaffold output
        run: pnpm run check:scaffold
      - name: Typecheck
        run: pnpm run typecheck
      - name: Test
        run: pnpm run test
      - name: Build
        run: pnpm run build
      - name: Render Kubernetes
        run: pnpm run test:k8s:render
      - name: Build evidence plan
        run: pnpm run evidence:build
