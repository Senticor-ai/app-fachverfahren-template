name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      KUBECTL_VERSION: v1.34.9
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup CI tools
        run: |
          export CI_PROJECT_DIR="$GITHUB_WORKSPACE"
          export TMPDIR="$RUNNER_TEMP/app-fachverfahren-template"
          scripts/ci-setup-node.sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate
        run: scripts/ci-validate.sh

      # Die folgenden Schritte spiegeln die GitLab-Stages `pages` und `image`, damit Storybook- und
      # Container-Build-Fehler HIER auffallen (und den Mirror-Push blockieren), statt erst nach dem
      # Push in der GitLab-Pipeline.
      - name: Build Storybook (mirrors GitLab `pages`)
        run: pnpm run build:storybook

      - name: Build container image (mirrors GitLab `image`)
        run: docker build -t app-fachverfahren-template:ci .
