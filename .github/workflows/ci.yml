name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI_PROJECT_DIR: ${{ github.workspace }}
      KUBECTL_VERSION: v1.34.9
      NODE_ENV: test
      TMPDIR: ${{ runner.temp }}/app-fachverfahren-template
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup CI tools
        run: scripts/ci-setup-node.sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate
        run: scripts/ci-validate.sh

  gitlab-validate-parity:
    name: GitLab Validate Parity
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Run validate in GitLab Node image
        run: |
          host_uid="$(id -u)"
          host_gid="$(id -g)"

          docker run --rm \
            --user root \
            -e HOST_UID="$host_uid" \
            -e HOST_GID="$host_gid" \
            -v "$PWD:/work" \
            -w /work \
            registry.opencode.de/open-code/oci/nodejs:24 \
            sh -lc '
              cleanup() {
                chown -R "${HOST_UID}:${HOST_GID}" /work || true
              }
              trap cleanup EXIT

              chown -R nonroot:nonroot /work
              mkdir -p /ci-tmp
              chown nonroot:nonroot /ci-tmp
              su nonroot -s /bin/sh -c '"'"'
                set -eu
                export CI=true
                export CI_PROJECT_DIR=/work
                export KUBECTL_VERSION=v1.34.9
                export NODE_ENV=test
                export TMPDIR=/ci-tmp
                export PNPM_HOME=/work/.pnpm
                export PATH="$PNPM_HOME:$PATH"

                . scripts/ci-setup-node.sh
                pnpm install --frozen-lockfile
                scripts/ci-validate.sh
              '"'"'
            '
