name: Scaffold Nightly

# Volle Scaffolded-App-Parität: nächtlich (und manuell) scaffolden über eine Domain-MATRIX (Bindestrich,
# Ziffern, Schutzbegriff) und in JEDER generierten App deren volles ci-validate.sh (CI_PROFILE=full) plus
# Runtime-Smoke fahren. Fängt Fehlerklassen, die eine einzelne `beispiel`-Core-Runde auf PRs verpasst.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  # TEMPORÄR (vor Merge entfernen): validiert die Nightly auf dem PR-Branch, weil workflow_dispatch
  # erst greift, wenn die Datei auf dem Default-Branch liegt.
  push:
    branches:
      - fix/scaffolded-app-ci-health

permissions:
  contents: read

concurrency:
  group: scaffold-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scaffold-matrix:
    name: Scaffold matrix (full + runtime)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          package-manager-cache: false
      - name: Setup CI tools
        run: |
          export CI_PROJECT_DIR="$GITHUB_WORKSPACE"
          export TMPDIR="$RUNNER_TEMP/app-fachverfahren-template"
          scripts/ci-setup-node.sh
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Scaffolded app CI (full + matrix)
        env:
          TMPDIR: ${{ runner.temp }}/generated-app-ci
          KEEP: "1"
        run: |
          mkdir -p "$TMPDIR"
          pnpm run test:generated-app-ci:matrix
      - name: Upload generated apps on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generated-apps-nightly-${{ github.run_id }}
          path: ${{ runner.temp }}/generated-app-ci/**
          retention-days: 7
          if-no-files-found: ignore
