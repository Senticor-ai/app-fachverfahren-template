name: Scaffold Nightly

# Volle Scaffolded-App-Parität: nächtlich (und manuell) scaffolden über eine Domain-MATRIX (Bindestrich,
# Ziffern, Schutzbegriff) und in JEDER generierten App deren volles ci-validate.sh (CI_PROFILE=full) plus
# Runtime-Smoke fahren. Fängt Fehlerklassen, die eine einzelne `beispiel`-Core-Runde auf PRs verpasst.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scaffold-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scaffold-matrix:
    name: Scaffold matrix (full + runtime)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Setup CI tools
        run: |
          export CI_PROJECT_DIR="$GITHUB_WORKSPACE"
          export TMPDIR="$RUNNER_TEMP/app-fachverfahren-template"
          scripts/ci-setup-node.sh
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Scaffolded app CI (full + matrix)
        env:
          # Kein Artefakt: generierte Apps sind deterministisch reproduzierbar; Fehler stehen im Log.
          TMPDIR: ${{ runner.temp }}/generated-app-ci
        run: |
          mkdir -p "$TMPDIR"
          pnpm run test:generated-app-ci:matrix
