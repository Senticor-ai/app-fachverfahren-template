apiVersion: v1
kind: Secret
metadata:
  name: app-postgres
  labels:
    app.kubernetes.io/name: app-postgres
    app.kubernetes.io/part-of: fachverfahren-template
type: Opaque
stringData:
  POSTGRES_DB: app
  POSTGRES_USER: app
  POSTGRES_PASSWORD: app
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-postgres-data
  labels:
    app.kubernetes.io/name: app-postgres
    app.kubernetes.io/part-of: fachverfahren-template
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-postgres
  labels:
    app.kubernetes.io/name: app-postgres
    app.kubernetes.io/part-of: fachverfahren-template
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-postgres
        app.kubernetes.io/part-of: fachverfahren-template
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          envFrom:
            - secretRef:
                name: app-postgres
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - app
                - -d
                - app
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: app-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: app-postgres
  labels:
    app.kubernetes.io/name: app-postgres
    app.kubernetes.io/part-of: fachverfahren-template
spec:
  selector:
    app.kubernetes.io/name: app-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
